<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
<div class="container">
    <nav class="sidebar">
        {% block sidebar %}
        {% include "sidebar.html" %}
        {% endblock %}
    </nav>
    <main class="main-content">
        <header class="topbar">
            {% block topbar %}
            {% include "topbar.html" %}
            {% endblock %}
        </header>
        <article>
            {% block content %}{% endblock %}
        </article>
    </main>
</div>
</body>
</html>
